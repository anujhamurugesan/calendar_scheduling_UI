<div class="event-card" [style.background-color]="event.color || '#f3f4f6'">
  <div class="event-title">{{event.title}}</div>
  <div class="event-time">{{event.time}}</div>
  
  <div class="event-users" *ngIf="event.users?.length">
    <div class="user-avatar" *ngFor="let u of event.users; let i = index" [style.z-index]="10 - i">
      <svg viewBox="0 0 24 24" fill="#6b7280" width="100%" height="100%">
        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
      </svg>
    </div>
  </div>
</div>
