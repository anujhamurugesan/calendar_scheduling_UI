<div class="event-card" 
     [style.background-color]="event.color || '#f3f4f6'"
     [style.top]="event.top" 
     [style.height]="event.height">
  
  <button class="delete-btn" (click)="onDelete($event)" title="Delete event">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 6L6 18M6 6l12 12"></path>
    </svg>
  </button>

  <div class="event-title">{{event.title}}</div>
  <div class="event-time">{{event.time}}</div>
  
  @if (event.users && event.users.length > 0) {
    <div class="event-users">
      @for (u of event.users; track $index) {
        <div class="user-avatar" [style.z-index]="10 - $index">
          <svg viewBox="0 0 24 24" fill="#6b7280" width="100%" height="100%">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
          </svg>
        </div>
      }
    </div>
  }
</div>
