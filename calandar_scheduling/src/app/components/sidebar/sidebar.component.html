<div class="sidebar">
  <div class="user-profile">
    <div class="avatar">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="20" fill="#2d2d3a"/>
        <circle cx="20" cy="15" r="7" fill="#888"/>
        <path d="M7 35C7 28 13 25 20 25C27 25 33 28 33 35" stroke="#888" stroke-width="4"/>
      </svg>
    </div>
    <div class="user-info">
      <h4>Antonio Larentio</h4>
      <p>Product Designer</p>
    </div>
    <div class="notifications">
      <div class="icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
      </div>
      <span class="badge">6</span>
    </div>
  </div>

  <div class="mini-calendar-wrapper">
    <app-mini-calendar></app-mini-calendar>
  </div>
  <div class="upcoming-event-card">
    <div class="time">12:00 - 13:30</div>
    <div class="title">Meat Gabriel at the International Library</div>
    <div class="actions">
      <button class="btn-later">Later</button>
      <button class="btn-details">Details</button>
    </div>
    <div class="eta">
      <span>🔔 14 min</span>
    </div>
    <div class="book-graphic">📖</div>
  </div>

  <div class="filter-section">
    <div class="section-header">
      <h4>My Calendars</h4>
      <span class="arrow">v</span>
    </div>
    <ul class="filter-list">
      <li *ngFor="let cal of calendars">
        <label class="custom-checkbox">
          <input type="checkbox" [checked]="cal.checked">
          <span class="checkmark"></span>
          <span class="label-text">{{cal.name}}</span>
        </label>
        <span class="count-badge" *ngIf="cal.count > 0">{{cal.count}}</span>
      </li>
    </ul>
  </div>

  <div class="filter-section">
    <div class="section-header">
      <h4>Categories</h4>
      <span class="arrow">v</span>
    </div>
    <ul class="category-list">
      <li *ngFor="let cat of categories">
        <div class="cat-info">
          <span class="dot" [style.background-color]="cat.color"></span>
          <span class="label-text">{{cat.name}}</span>
        </div>
        <div class="progress-bar">
          <div class="fill" [style.width.%]="cat.value" [style.background-color]="cat.color"></div>
        </div>
      </li>
    </ul>
  </div>
</div>
